# StructBioReasoner Configuration Template
jnana:
  config_path: "../Jnana/config/models.yaml"
  enable_protognosis: true
  enable_biomni: true

tools:
  pymol:
    enabled: true
    headless_mode: true
  biopython:
    enabled: true

agents:
  structural_analysis:
    enabled: true
  evolutionary_conservation:
    enabled: true
  energetic_analysis:
    enabled: true
  mutation_design:
    enabled: true

logging:
  level: "INFO"
