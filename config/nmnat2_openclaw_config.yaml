campaign:
  # Phase 1: Interactome Exploration (interactive mode)
  exploration:
    goal: "Identify NMNAT-2 interactome members and select therapeutic target"
    step_sequence:
      - rag               # HiPerRAG literature mining
      - structure_prediction  # Fold NMNAT-2 with top partners
      - molecular_dynamics    # Simulate interactome interfaces
      - analysis              # Identify hotspots, rank interfaces
    max_iterations: 10

  # Phase 2: Binder Design Campaign (tournament mode)
  design:
    goal: "Design binders targeting NMNAT-2:p53 hydrophobic interface"
    step_sequence:
      - computational_design  # BindCraft binder generation
      - molecular_dynamics    # MD assessment of stability
      - free_energy           # MM-PBSA ranking
    max_iterations: 15

design_parameters:
  target_binding_affinity_nm: 10.0  # < 10 nM
  max_rmsd_angstrom: 3.0
  validated_candidates_target: 97000
  num_bindcraft_rounds: 5
  fold_backend: "chai"
  inv_fold_backend: "proteinmpnn"

artifacts:
  store_root: "artifact_store/nmnat2_openclaw"
  provenance_tracking: true
