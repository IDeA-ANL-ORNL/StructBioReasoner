# Hierarchical Multi-Agent Workflow Configuration

hierarchical_workflow:
  # Overall workflow settings
  total_compute_nodes: 50
  num_managers: 5
  max_rounds: 3
  
  # Executive Agent configuration
  executive:
    llm_model: "gpt-4"
    temperature: 0.3
    max_tokens: 2000
    
    # Resource allocation strategy
    resource_allocation:
      strategy: "performance_based"  # Options: "equal", "performance_based", "adaptive"
      min_nodes_per_manager: 1
      max_nodes_per_manager: 20
      
    # Manager lifecycle decisions
    lifecycle:
      min_managers_to_keep: 2
      performance_threshold: 0.5  # Managers below this get terminated
      
  # Manager Agent configuration
  manager:
    llm_model: "gpt-4"
    temperature: 0.5
    max_tokens: 1000
    
    # Task sequencing
    task_sequence:
      default_sequence:
        - folding
        - simulation
        - clustering
        - hotspot_analysis
        - binder_design
      
      allow_dynamic_sequencing: true  # Let LLM decide sequence
      
    # Stopping criteria
    stopping_criteria:
      max_tasks_per_campaign: 10
      min_binder_affinity: -10.0  # kcal/mol (more negative = better)
      max_iterations_without_improvement: 3
      
  # Worker Agent configurations
  agents:
    # Folding agent (Chai)
    folding:
      backend: "chai"
      device: "cuda:0"
      num_predictions: 5
      
    # Simulation agent (MDAgent)
    simulation:
      backend: "mdagent"
      solvent: "implicit"  # Options: "implicit", "explicit"
      timesteps: 1000000
      temperature: 300  # Kelvin
      save_frequency: 1000
      
    # Clustering agent
    clustering:
      algorithm: "kmeans"  # Options: "kmeans", "hierarchical", "dbscan"
      n_clusters: 5
      feature_type: "rmsd"  # Options: "rmsd", "contacts", "dihedral"
      
    # Hotspot analysis
    hotspot:
      method: "contact_frequency"  # Options: "contact_frequency", "energy", "combined"
      threshold: 0.7
      min_contacts: 5
      
    # Binder design agent (BindCraft)
    binder_design:
      backend: "bindcraft"
      scaffold_type: "affibody"  # Options: "affibody", "nanobody", "affitin"
      num_designs: 25
      num_rounds: 3
      inverse_folding:
        model: "proteinmpnn"
        sampling_temp: 0.1
        num_seq: 25
      
  # Performance metrics
  metrics:
    # What to track for Manager evaluation
    track_metrics:
      - binder_affinity
      - num_tasks_completed
      - time_to_completion
      - resource_efficiency
      
    # Weights for performance score calculation
    metric_weights:
      binder_affinity: 0.7
      task_efficiency: 0.2
      resource_efficiency: 0.1
      
  # Logging and output
  logging:
    level: "INFO"
    save_round_results: true
    save_manager_summaries: true
    output_dir: "results/hierarchical_workflow"
    
  # HiPerRAG integration
  hiper_rag:
    enabled: true
    query_frequency: "per_round"  # Options: "once", "per_round", "per_manager"
    retrieval_top_k: 200
    retrieval_score_threshold: 0.1

