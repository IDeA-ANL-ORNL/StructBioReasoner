# BinderDesignReasoner Configuration
# Extends Jnana configuration for binder design applications

# Binder Design Specific Settings
history:
  num_history: 3
binder_design:
  # Default binder design settings
  default_design:
    include_structure: true
    include_sequence: true
    include_dynamics: true
    include_energetics: true

  # Validation thresholds
  validation:
    min_confidence_score: 0.6
    min_binding_affinity: -8.0  # kcal/mol
    max_rmsd_threshold: 3.0

# Knowledge Sources Configuration
knowledge_sources:
  # Protein databases
  databases:
    pdb:
      enabled: true
      api_url: "https://www.rcsb.org/pdb/rest/webservices"
      local_cache: "./data/pdb_cache"
      update_frequency: "weekly"
    
    uniprot:
      enabled: true
      api_url: "https://www.uniprot.org/uniprot/"
      local_cache: "./data/uniprot_cache"
      update_frequency: "monthly"

  # Literature processing
  literature:
    adaparse:
      enabled: true
      pdf_directory: "./data/literature/pdfs"
      output_directory: "./data/literature/parsed"
      parser_config: "protein_optimized"
      num_workers: 8
      quality_threshold: 0.95
    
    hiperrag:
      enabled: true
      index_path: "./data/literature/hiperrag_index"
      model: "sentence-transformers/all-MiniLM-L6-v2"
      batch_size: 32
      max_sequence_length: 512
      similarity_threshold: 0.7

  # Knowledge graph
  knowledge_graph:
    enabled: true
    database_type: "neo4j"
    connection:
      uri: "bolt://localhost:7687"
      username: "neo4j"
      password: "${NEO4J_PASSWORD}"

# Computational Tools Configuration
tools:
  # PyMOL for visualization
  pymol:
    enabled: true
    executable_path: "pymol"
    headless_mode: true
    ray_trace_quality: 2
    image_format: "png"
    image_resolution: [1024, 768]

  # BioPython for sequence/structure analysis
  biopython:
    enabled: true
    pdb_parser: "PDBParser"
    sequence_alignment_tool: "muscle"
    blast_database: "nr"

  # OpenMM for molecular dynamics simulations
  openmm:
    enabled: true
    platform: "OpenCL"
    precision: "mixed"
    output_dir: "openmm_outputs"
    force_field: "amber14-all.xml"
    water_model: "amber14/tip3pfb.xml"
    temperature: 300
    pressure: 1.0
    timestep: 2.0
    friction: 1.0
    production_steps: 5000
    equilibration_steps: 2500
    trajectory_interval: 100
    energy_interval: 100

# Agent Configuration
agents:
  # Computational Design Agent (BindCraft)
  computational_design:
    enabled: true
    capabilities:
      - "binder_design"
      - "sequence_optimization"
      - "structure_prediction"
      - "affinity_optimization"
    tools: ["biopython"]
    
    # BindCraft-specific settings
    bindcraft:
      cwd: '/flare/FoundEpidem/avasan/IDEAL/Agentics/StructBioReasoner'
      target_sequence: 'NITNLCPFGEVFNATRFASVYAWNRKRISNCVADYSVLYNSASFSTFKCYGVSPTKLNDLCFTNVYADSFVIRGDEVRQIAPGQTGKIADYNYKLPDDFTGCVIAWNSNNLDSKVGGNYNYLYRLFRKSNLKPFERDISTEIYQAGSTPCNGVEGFNCYFPLQSYGFQPTNGVGYQPYRVVVLSFELLHAPATVCGPKKSTNLVKNKCVNF'
      binder_sequence: 'DPIQMGNDEFQKQNCLLEGEKQKLISEEDLLRKRREQLKHKLEQLRNSCA'
      device: 'xpu'
      num_rounds: 3
      fold_backend: "chai"  # Options: chai, alphafold
      inv_fold_backend: "proteinmpnn"
    
    # InverseFolding parameters
    inverse_folding:
      num_seq: 5
      batch_size: 5
      max_retries: 5
      sampling_temp: "0.1"
      model_name: "v_48_020"
      model_weights: "soluble_model_weights"
      proteinmpnn_path: "/lus/flare/projects/FoundEpidem/avasan/Software/ProteinMPNN"  # Update with actual path
    
    # Quality control
    quality_control:
      max_repeat: 4
      max_appearance_ratio: 0.33
      max_charge: 9
      max_charge_ratio: 0.5
      max_hydrophobic_ratio: 0.8
      min_diversity: 8
      bad_motifs: [] #null
      bad_n_termini: [] #null
    
    confidence_threshold: 0.7

    # This config allows distllm.chat to spawn an interactive chat session.
  rag:
    rag_configs:
      generator_config:
        #_target_: ArgoGeneratorConfig
        #model: "argo:gpt-4.1"  # Optional, uses env var if not specified
        #base_url: "http://lambda5:55625"  # Optional, uses env var if not specified
        #temperature: 0.0
        #max_tokens: 32768
        _target_: OpenAIAPIGeneratorConfig
        model: "gpt-4.1"
        temperature: 0.1
        max_tokens: 32768
    
      retriever_config:
        faiss_config:
          name: faiss_index_v2
          dataset_dir: /flare/FoundEpidem/biostructreasoner/merged
          faiss_index_path: /flare/FoundEpidem/biostructreasoner/faiss_indices/sfr_mistral_nmnat
          dataset_chunk_paths: null
          precision: float32
          search_algorithm: exact
          rescore_multiplier: 2
          num_quantization_workers: 1
    
        encoder_config:
          name: auto
          pretrained_model_name_or_path: "Salesforce/SFR-Embedding-Mistral"
    
        pooler_config:
          name: last_token
    
      verbose: false
    
    save_conversation_path: /lus/flare/projects/FoundEpidem/avasan/IDEAL/Agentics/StructBioReasoner/output/rag_logs
  # Molecular Dynamics Agent
  molecular_dynamics:
    enabled: true
    md_backend: "mdagent"  # Options: "openmm" or "mdagent"
    capabilities:
      - "binding_stability_prediction"
      - "complex_validation"
      - "flexibility_analysis"
      - "dynamics_hypothesis_generation"
    tools: ["openmm"]
    
    simulation:
      temperature: 300  # K
      pressure: 1.0     # atm
      equilibration_steps: 10000
      production_steps: 500000  # 1ns default
      force_field: "amber14-all.xml"
      water_model: "amber14/tip3pfb.xml"
    
    analysis:
      rmsd_threshold: 0.3  # nm
      rmsf_threshold: 0.2  # nm
      stability_score_threshold: 70.0
      confidence_threshold: 0.6

    # MDAgent backend configuration
    mdagent:
      solvent_model: "implicit"  # Options: "implicit" or "explicit"
      force_field: "amber14"
      water_model: "tip3p"
      equil_steps: 10_000
      prod_steps: 1_000_000  # 2ns at 2fs timestep
      protein: true
      output_file: "system.pdb"
      ambertools: "/lus/flare/projects/Aurora_deployment/avasan/envs/ambertools" 
      platform: "OpenCL"

  # Energetic Analysis Agent
  energetic_analysis:
    enabled: true
    capabilities:
      - "binding_affinity_estimation"
      - "stability_prediction"
      - "interface_energy_calculation"
    tools: ["openmm"]
    energy_units: "kcal/mol"

# User Interface Configuration
ui:
  terminal:
    enable_protein_viewer: true
    enable_sequence_viewer: true
    enable_binder_tracker: true
    max_structures_displayed: 5

  web:
    enabled: false
    port: 8080
    enable_3d_viewer: true
    enable_real_time_updates: true

  visualization:
    default_representation: "cartoon"
    color_scheme: "by_chain"
    show_sidechains: false
    show_hydrogen_bonds: true
    animation_speed: 1.0

# Performance and Resource Settings
performance:
  max_concurrent_agents: 5
  max_memory_gb: 16
  enable_gpu_acceleration: true
  gpu_memory_fraction: 0.8

  cache:
    enabled: true
    max_size_gb: 10
    ttl_hours: 24
    cache_structures: true
    cache_predictions: true

  parallel:
    max_workers: 8
    chunk_size: 100
    enable_multiprocessing: true

# Logging and Monitoring
logging:
  level: "INFO"
  format: "structured"
  output_file: "./logs/binder_design_reasoner.log"
  max_file_size_mb: 100
  backup_count: 5

  components:
    agents: "INFO"
    tools: "WARNING"
    knowledge_graph: "INFO"
    literature: "INFO"

# Development and Testing Settings
development:
  debug_mode: false
  enable_profiling: false
  mock_expensive_tools: false
  test_data_path: "./tests/data"
  benchmark_data_path: "./benchmarks/data"

# Security Settings
security:
  api_rate_limits:
    pdb_api: 100
    uniprot_api: 60
  
  data_privacy:
    anonymize_sequences: false
    encrypt_sensitive_data: false
    audit_log_access: true

parsl:
  available_accelerators: ['0', '1'] #tile_names = [f'{gid}.{tid}' for gid in range(6) for tid in range(2)] #4
  nodes: 1
