# StructBioReasoner Configuration
# Extends Jnana configuration for protein engineering applications

# Jnana Integration Settings
jnana:
  config_path: "../Jnana/config/models.example.yaml"  # Path to Jnana configuration
  enable_protognosis: true
  enable_biomni: false  # Disabled for now
  enable_wisteria_ui: true

# Protein Engineering Specific Settings
protein_engineering:
  # Default protein analysis settings
  default_analysis:
    include_structure: true
    include_sequence: true
    include_evolution: true
    include_energetics: true
    include_dynamics: false  # Computationally expensive

  # Mutation design parameters
  mutation_design:
    max_mutations_per_hypothesis: 5
    consider_conservative_mutations: true
    include_combinatorial_designs: false
    energy_cutoff_kcal_mol: 2.0  # Maximum destabilization allowed

  # Validation thresholds
  validation:
    min_sequence_identity: 0.3  # For homology-based predictions
    max_rmsd_threshold: 3.0     # For structure comparisons
    min_confidence_score: 0.6   # For AI predictions

# Knowledge Sources Configuration
knowledge_sources:
  # Protein databases
  databases:
    pdb:
      enabled: true
      api_url: "https://www.rcsb.org/pdb/rest/webservices"
      local_cache: "./data/pdb_cache"
      update_frequency: "weekly"
    
    uniprot:
      enabled: true
      api_url: "https://www.uniprot.org/uniprot/"
      local_cache: "./data/uniprot_cache"
      update_frequency: "monthly"
    
    alphafold_db:
      enabled: true
      api_url: "https://alphafold.ebi.ac.uk/api/"
      local_cache: "./data/alphafold_cache"
      download_structures: false  # Set to true to download structure files

  # Literature processing
  literature:
    adaparse:
      enabled: true
      pdf_directory: "./data/literature/pdfs"
      output_directory: "./data/literature/parsed"
      parser_config: "protein_optimized"
      num_workers: 8
      quality_threshold: 0.95
    
    hiperrag:
      enabled: true
      index_path: "./data/literature/hiperrag_index"
      model: "sentence-transformers/all-MiniLM-L6-v2"  # Default model
      batch_size: 32
      max_sequence_length: 512
      similarity_threshold: 0.7

  # Knowledge graph
  knowledge_graph:
    enabled: true
    database_type: "neo4j"  # Options: neo4j, networkx
    connection:
      uri: "bolt://localhost:7687"
      username: "neo4j"
      password: "${NEO4J_PASSWORD}"
    
    # Graph schema configuration
    schema:
      protein_nodes: ["Protein", "Domain", "Residue", "Mutation"]
      relationship_types: ["CONTAINS", "INTERACTS_WITH", "AFFECTS", "HOMOLOGOUS_TO"]
    
    # Data import settings
    import_settings:
      batch_size: 1000
      enable_constraints: true
      create_indexes: true

# Computational Tools Configuration
tools:
  # PyMOL for visualization
  pymol:
    enabled: true
    executable_path: "pymol"  # Use system PATH
    headless_mode: true
    ray_trace_quality: 2
    image_format: "png"
    image_resolution: [1024, 768]

  # BioPython for sequence/structure analysis
  biopython:
    enabled: true
    pdb_parser: "PDBParser"  # Options: PDBParser, MMCIFParser
    sequence_alignment_tool: "muscle"  # Options: muscle, clustalo
    blast_database: "nr"

  # OpenMM for molecular dynamics simulations
  openmm:
    enabled: true
    platform: "CUDA"  # CUDA, OpenCL, CPU
    precision: "mixed"  # single, mixed, double
    output_dir: "openmm_outputs"

    # Force field settings
    force_field: "amber14-all.xml"
    water_model: "amber14/tip3pfb.xml"

    # Simulation parameters
    temperature: 300  # Kelvin
    pressure: 1.0     # bar
    timestep: 2.0     # femtoseconds
    friction: 1.0     # 1/picosecond

    # Production simulation
    production_steps: 5000000    # 10 ns at 2 fs timestep
    equilibration_steps: 250000  # 0.5 ns equilibration

    # Analysis parameters
    trajectory_interval: 1000    # Save every 2 ps
    energy_interval: 100         # Energy every 0.2 ps

    # Thermostability analysis
    temperature_range: [300, 400]  # K
    temperature_steps: 11
    stability_threshold: 0.3       # RMSD threshold for unfolding

  # RFDiffusion for generative protein design
  rfdiffusion:
    enabled: true  # Enable for mock mode functionality
    model_path: ""  # Path to RFDiffusion model (empty for mock mode)
    output_dir: "rfdiffusion_outputs"

    # Generation parameters
    num_designs: 10
    sampling_steps: 200
    guidance_scale: 1.0

    # Design constraints
    min_length: 50
    max_length: 500
    secondary_structure_weight: 0.5

    # Motif scaffolding
    motif_rmsd_threshold: 1.0
    scaffold_diversity_threshold: 0.3

  # Rosetta for computational protein design
  rosetta:
    enabled: true  # Enable for mock mode functionality
    rosetta_path: "/path/to/rosetta/bin"  # Path for real installation
    database_path: "/path/to/rosetta/database"  # Path for real installation
    output_dir: "rosetta_outputs"

    # Scoring and design
    score_function: "ref2015"
    num_processors: 1
    relax_rounds: 5
    design_iterations: 10

    # Energy thresholds
    energy_threshold: -100.0
    stability_improvement_target: 5.0

  # AlphaFold for structure prediction
  alphafold:
    enabled: true  # Enable for mock mode functionality
    alphafold_path: "/path/to/alphafold"  # Path for real installation
    database_path: "/path/to/alphafold/databases"  # Path for real installation
    output_dir: "alphafold_outputs"

    # Prediction parameters
    model_preset: "monomer"  # monomer, multimer
    max_template_date: "2022-01-01"
    use_gpu: true
    num_ensemble: 1
    num_multimer_predictions_per_model: 5

    # Confidence thresholds
    high_confidence_threshold: 90.0
    medium_confidence_threshold: 70.0
    low_confidence_threshold: 50.0

  # ESM for protein language model analysis
  esm:
    enabled: true
    output_dir: "esm_outputs"
    device: "auto"  # auto, cuda, cpu

    # Model settings
    esm2_model: "esm2_t33_650M_UR50D"
    esmfold_model: "esm2_t36_3B_UR50D"
    embedding_layer: 33

    # Analysis parameters
    max_sequence_length: 1024
    batch_size: 1
    conservation_threshold: 0.8
    functional_site_threshold: 0.9

    # ESMFold settings
    esmfold_confidence_threshold: 70.0
    chunk_size: 64

  # Molecular dynamics (optional)
  molecular_dynamics:
    enabled: false
    engine: "openmm"  # Options: openmm, gromacs, amber
    force_field: "amber14"
    water_model: "tip3p"
    simulation_time_ns: 10

# Agent Configuration
agents:
  # Structural Analysis Agent
  structural_analysis:
    enabled: true
    capabilities:
      - "active_site_identification"
      - "cavity_analysis" 
      - "interface_prediction"
      - "conformational_sampling"
    tools: ["pymol", "biopython", "esm"]
    confidence_threshold: 0.7

  # Evolutionary Conservation Agent
  evolutionary_conservation:
    enabled: true
    capabilities:
      - "msa_generation"
      - "conservation_scoring"
      - "coevolution_analysis"
      - "phylogenetic_inference"
    tools: ["biopython", "muscle", "esm"]
    min_sequences_for_msa: 50

  # Energetic Analysis Agent
  energetic_analysis:
    enabled: true
    capabilities:
      - "stability_prediction"
      - "binding_affinity_estimation"
      - "folding_energy_calculation"
    tools: ["rosetta", "esm", "openmm"]  # Rosetta optional
    energy_units: "kcal/mol"

  # Molecular Dynamics Agent
  molecular_dynamics:
    enabled: true
    md_backend: "openmm"  # Options: "openmm" or "mdagent"
    capabilities:
      - "thermostability_prediction"
      - "mutation_validation"
      - "flexibility_analysis"
      - "dynamics_hypothesis_generation"
    tools: ["openmm"]
    simulation:
      temperature: 300  # K
      pressure: 1.0     # atm
      equilibration_steps: 10000
      production_steps: 500000  # 1ns default
      force_field: "amber14-all.xml"
      water_model: "amber14/tip3pfb.xml"
    analysis:
      rmsd_threshold: 0.3  # nm
      rmsf_threshold: 0.2  # nm
      stability_score_threshold: 70.0
      confidence_threshold: 0.6

    # MDAgent backend configuration (optional)
    mdagent:
      solvent_model: "explicit"  # Options: "implicit" or "explicit"
      force_field: "amber14"
      water_model: "tip3p"
      equil_steps: 10_000
      prod_steps: 1_000_000  # 2ns at 2fs timestep
      protein: true
      output_file: "system.pdb"

  # RFDiffusion Generative Design Agent
  rfdiffusion_agent:
    enabled: true  # Enable for mock mode functionality
    capabilities:
      - "de_novo_protein_design"
      - "motif_scaffolding"
      - "protein_interaction_design"
      - "structure_optimization"
    tools: ["rfdiffusion"]
    design_strategies:
      - "de_novo_design"
      - "motif_scaffolding"
      - "interaction_design"
      - "structure_optimization"
    max_designs_per_hypothesis: 5
    confidence_threshold: 0.7
    diversity_threshold: 0.3

  # Rosetta Computational Design Agent
  rosetta_agent:
    enabled: true  # Enable for mock mode functionality
    capabilities:
      - "energy_based_design"
      - "stability_optimization"
      - "loop_modeling_design"
      - "interface_optimization"
    tools: ["rosetta"]
    design_strategies:
      - "energy_optimization"
      - "stability_enhancement"
      - "loop_engineering"
      - "interface_design"
    energy_threshold: -100.0
    stability_improvement_target: 5.0
    design_iterations: 10

  # AlphaFold Structure Prediction Agent
  alphafold_agent:
    enabled: true  # Enable for mock mode functionality
    capabilities:
      - "structure_prediction"
      - "confidence_analysis"
      - "mutation_impact_prediction"
      - "comparative_structure_analysis"
    tools: ["alphafold"]
    analysis_strategies:
      - "structure_prediction"
      - "confidence_analysis"
      - "mutation_impact"
      - "comparative_analysis"
    high_confidence_threshold: 90.0
    medium_confidence_threshold: 70.0
    low_confidence_threshold: 50.0

  # ESM Language Model Agent
  esm_agent:
    enabled: true
    capabilities:
      - "sequence_embedding_analysis"
      - "conservation_analysis"
      - "functional_site_prediction"
      - "mutation_effect_prediction"
    tools: ["esm"]
    analysis_strategies:
      - "sequence_analysis"
      - "conservation_analysis"
      - "functional_prediction"
      - "mutation_design"
    conservation_threshold: 0.8
    functional_site_threshold: 0.9
    mutation_confidence_threshold: 0.7

  # Mutation Design Agent
  mutation_design:
    enabled: true
    capabilities:
      - "rational_mutation_proposal"
      - "library_design"
      - "saturation_mutagenesis_planning"
      - "combinatorial_optimization"
    tools: ["rosetta", "esm", "biopython"]
    max_mutations_per_round: 10

  # Literature Analysis Agent
  literature_analysis:
    enabled: true
    capabilities:
      - "paper_retrieval"
      - "experimental_data_extraction"
      - "method_comparison"
      - "precedent_identification"
    tools: ["adaparse", "hiperrag"]
    max_papers_per_query: 100

# User Interface Configuration
ui:
  # Terminal interface settings
  terminal:
    enable_protein_viewer: true
    enable_sequence_viewer: true
    enable_mutation_tracker: true
    max_structures_displayed: 5

  # Web interface settings (optional)
  web:
    enabled: false
    port: 8080
    enable_3d_viewer: true
    enable_real_time_updates: true

  # Visualization settings
  visualization:
    default_representation: "cartoon"
    color_scheme: "by_chain"
    show_sidechains: false
    show_hydrogen_bonds: true
    animation_speed: 1.0

# Performance and Resource Settings
performance:
  # Computational resources
  max_concurrent_agents: 5
  max_memory_gb: 16
  enable_gpu_acceleration: true
  gpu_memory_fraction: 0.8

  # Caching settings
  cache:
    enabled: true
    max_size_gb: 10
    ttl_hours: 24
    cache_structures: true
    cache_predictions: true

  # Parallel processing
  parallel:
    max_workers: 8
    chunk_size: 100
    enable_multiprocessing: true

# Logging and Monitoring
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  format: "structured"
  output_file: "./logs/struct_bio_reasoner.log"
  max_file_size_mb: 100
  backup_count: 5

  # Component-specific logging
  components:
    agents: "INFO"
    tools: "WARNING"
    knowledge_graph: "INFO"
    literature: "INFO"

# Development and Testing Settings
development:
  debug_mode: false
  enable_profiling: false
  mock_expensive_tools: false  # Use mock responses for expensive computations
  test_data_path: "./tests/data"
  benchmark_data_path: "./benchmarks/data"

# Security Settings
security:
  api_rate_limits:
    pdb_api: 100  # requests per minute
    uniprot_api: 60
    alphafold_api: 30
  
  data_privacy:
    anonymize_sequences: false
    encrypt_sensitive_data: false
    audit_log_access: true
